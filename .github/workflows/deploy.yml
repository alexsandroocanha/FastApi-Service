name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ['main']

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt pytest httpx

      - name: Rodar testes
        run: pytest --tb=short

  Build:
    runs-on: ubuntu-latest
    needs: Test
    environment: Docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build local para scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: falace/api_python:deploy-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan de vulnerabilidades
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: falace/api_python:deploy-${{ github.sha }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
          format: table
          timeout: '10m'

      - name: Build e push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            falace/api_python:deploy-${{ github.sha }}
            falace/api_python:latest

  Deploy:
    runs-on: ubuntu-latest
    needs: Build
    environment: Docker
    steps:
      - name: Adicionar chave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Clonar repositório de manifests
        run: git clone ${{ secrets.REPO_GIT }} ~/repo

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Atualizar tag da imagem no manifest
        run: |
          cd ~/repo
          kustomize edit set image falace/api_python:deploy-${{ github.sha }}

      - name: Criar branch, commit e abrir Pull Request
        run: |
          cd ~/repo
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="chore/deploy-${GITHUB_SHA::7}"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore: deploy ${GITHUB_SHA::7}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: deploy ${GITHUB_SHA::7}" \
            --body "Deploy automático de ${{ github.repository }}@${{ github.sha }}" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
